[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
```

### Key fixes:
- Added `python311Packages.pip` to `nixPkgs` → installs pip
- Changed `pip install requirements.txt` → `pip install -r requirements.txt` (the `-r` flag was missing!)

---

## Also Delete These Files (Let Railway Auto-detect)

If the above still causes issues, the **simplest solution** is to delete `nixpacks.toml` entirely and just rely on:

**`runtime.txt`:**
```
python-3.11.9
```

**`Procfile`:**
```
web: uvicorn main:app --host 0.0.0.0 --port $PORT